name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest with coverage
        run: pytest --cov=neuralstrike --cov-report=term-missing --cov-fail-under=85

  supply-chain:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install from pinned requirements (hashes)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt
          pip install --no-deps -e .

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q

      - name: pip-audit
        run: |
          pip-audit --desc --require-hashes -r requirements.txt

      - name: SBOM (CycloneDX)
        run: |
          cyclonedx-py environment -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Fresh-clone smoke
        run: |
          neuralstrike smoke
          test -f neuralstrike-smoke.json

  dashboard:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Test report parsing
        working-directory: dashboard
        run: npm test

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Upload dashboard build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
