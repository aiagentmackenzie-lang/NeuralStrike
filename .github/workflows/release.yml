name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g., 1.0.0)"
        required: true
        type: string
      publish:
        description: "Push GHCR image, create GitHub release, publish to PyPI"
        required: true
        type: boolean
        default: false
      sign:
        description: "Cosign sign the image and attach a CycloneDX/Rekor attestation"
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom

      - name: Build Python distribution
        run: python -m build

      - name: Generate CycloneDX SBOM
        run: |
          pip install --require-hashes -r requirements.txt
          pip install --no-deps -e .
          cyclonedx-py environment -o neuralstrike-sbom.json

      - name: Upload distribution + SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/
            neuralstrike-sbom.json

      - name: Publish to PyPI
        if: inputs.publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.publish
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.publish }}

      - name: Build (and optionally push) multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.publish }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Install cosign
        if: inputs.publish && inputs.sign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image
        if: inputs.publish && inputs.sign
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      - name: Cosign attest CycloneDX SBOM to Rekor
        if: inputs.publish && inputs.sign
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --predicate neuralstrike-sbom.json \
            --type cyclonedx \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      - name: Create GitHub release
        if: inputs.publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: NeuralStrike v${{ inputs.version }}
          files: |
            dist/*
            neuralstrike-sbom.json
          generate_release_notes: true
